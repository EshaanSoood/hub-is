name: Deploy

on:
  push:
    branches:
      - main
      - homepage-refactor

jobs:
  deploy:
    runs-on: self-hosted
    permissions:
      contents: read
    env:
      DEPLOY_REMOTE_ROOT: /home/eshaan/deployments/eshaan-os-root
      DEPLOY_REMOTE_HUB_API_DIR: /home/eshaan/deployments/eshaan-os-hub-api
      DEPLOY_REMOTE_COLLAB_DIR: /home/eshaan/deployments/eshaan-os-hub-collab
      DEPLOY_REMOTE_TUWUNEL_DIR: /home/eshaan/deployments/eshaan-os-tuwunel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        env:
          VITE_KEYCLOAK_URL: ${{ secrets.VITE_KEYCLOAK_URL }}
          VITE_KEYCLOAK_REALM: ${{ secrets.VITE_KEYCLOAK_REALM }}
          VITE_KEYCLOAK_CLIENT_ID: ${{ secrets.VITE_KEYCLOAK_CLIENT_ID }}
        run: npm run validate

      - name: Deploy root
        run: |
          mkdir -p "$DEPLOY_REMOTE_ROOT/dist"
          rsync -a --delete dist/ "$DEPLOY_REMOTE_ROOT/dist/"
          docker compose -f "$DEPLOY_REMOTE_ROOT/docker-compose.yml" up -d --force-recreate web

      - name: Deploy hub API
        run: |
          mkdir -p "$DEPLOY_REMOTE_HUB_API_DIR/shared"
          cp -a apps/hub-api/. "$DEPLOY_REMOTE_HUB_API_DIR/"
          cp -a apps/shared/. "$DEPLOY_REMOTE_HUB_API_DIR/shared/"
          docker compose -f "$DEPLOY_REMOTE_HUB_API_DIR/docker-compose.yml" up -d --build

      - name: Deploy collab
        run: |
          mkdir -p "$DEPLOY_REMOTE_COLLAB_DIR/shared"
          cp -a apps/hub-collab/. "$DEPLOY_REMOTE_COLLAB_DIR/"
          cp -a apps/shared/. "$DEPLOY_REMOTE_COLLAB_DIR/shared/"
          docker compose -f "$DEPLOY_REMOTE_COLLAB_DIR/docker-compose.yml" up -d --build

      - name: Deploy tuwunel
        run: |
          if [ ! -f "$DEPLOY_REMOTE_TUWUNEL_DIR/.env" ]; then
            echo "Skipping Tuwunel deploy because $DEPLOY_REMOTE_TUWUNEL_DIR/.env is not provisioned on the server."
            exit 0
          fi

          mkdir -p "$DEPLOY_REMOTE_TUWUNEL_DIR"
          cp -a apps/tuwunel/. "$DEPLOY_REMOTE_TUWUNEL_DIR/"
          docker compose -f "$DEPLOY_REMOTE_TUWUNEL_DIR/docker-compose.yml" up -d --build
