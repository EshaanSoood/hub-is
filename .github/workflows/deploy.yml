name: Deploy

on:
  push:
    branches:
      - main
      - manual-project-tests

jobs:
  deploy:
    runs-on: self-hosted
    permissions:
      contents: write
    env:
      DEPLOY_REMOTE_ROOT: /home/eshaan/deployments/eshaan-os-root
      DEPLOY_REMOTE_HUB_API_DIR: /home/eshaan/deployments/eshaan-os-hub-api
      DEPLOY_REMOTE_COLLAB_DIR: /home/eshaan/deployments/eshaan-os-hub-collab
      DEPLOY_REMOTE_TUWUNEL_DIR: /home/eshaan/deployments/eshaan-os-tuwunel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout facets-parser
        uses: actions/checkout@v4
        with:
          repository: EshaanSoood/facets-parser
          path: facets-parser
          token: ${{ secrets.FACETS_PARSER_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        env:
          VITE_KEYCLOAK_URL: ${{ secrets.VITE_KEYCLOAK_URL }}
          VITE_KEYCLOAK_REALM: ${{ secrets.VITE_KEYCLOAK_REALM }}
          VITE_KEYCLOAK_CLIENT_ID: ${{ secrets.VITE_KEYCLOAK_CLIENT_ID }}
        run: npm run validate

      - name: Deploy root
        run: |
          mkdir -p "$DEPLOY_REMOTE_ROOT/dist"
          rsync -a --delete dist/ "$DEPLOY_REMOTE_ROOT/dist/"
          docker compose -f "$DEPLOY_REMOTE_ROOT/docker-compose.yml" up -d --force-recreate web

      - name: Verify root health
        run: |
          for attempt in {1..10}; do
            if curl -fsS https://eshaansood.org >/dev/null; then
              echo "Root health check passed."
              exit 0
            fi
            echo "Root health check attempt $attempt/10 failed; retrying..."
            sleep 3
          done
          echo "Root health check failed after 30 seconds."
          exit 1

      - name: Deploy hub API
        run: |
          mkdir -p "$DEPLOY_REMOTE_HUB_API_DIR/shared"
          cp -a apps/hub-api/. "$DEPLOY_REMOTE_HUB_API_DIR/"
          cp -a apps/shared/. "$DEPLOY_REMOTE_HUB_API_DIR/shared/"
          docker compose -f "$DEPLOY_REMOTE_HUB_API_DIR/docker-compose.yml" up -d --build

      - name: Verify hub API health
        run: |
          verify_json() {
            node -e "
              const chunks = [];
              process.stdin.on('data', (chunk) => chunks.push(chunk));
              process.stdin.on('end', () => {
                const payload = JSON.parse(Buffer.concat(chunks).toString('utf8'));
                if (payload.ok !== true || !payload.data) {
                  process.exit(1);
                }
              });
            "
          }

          for attempt in {1..20}; do
            if curl -fsS https://api.eshaansood.org/api/hub/health | verify_json; then
              echo "Hub API host health check passed."
              break
            fi
            if [ "$attempt" = "20" ]; then
              echo "Hub API host health check failed after 60 seconds."
              exit 1
            fi
            echo "Hub API host health check attempt $attempt/20 failed; retrying..."
            sleep 3
          done

          response_file="$(mktemp)"
          headers_file="$(mktemp)"
          trap 'rm -f "$response_file" "$headers_file"' EXIT

          for attempt in {1..20}; do
            status="$(curl -sS -D "$headers_file" -o "$response_file" -w '%{http_code}' https://eshaansood.org/api/hub/me || true)"
            content_type="$(awk 'tolower($1) == "content-type:" { print tolower($2); exit }' "$headers_file")"
            if [ "$status" = "401" ] && [[ "$content_type" == application/json* ]]; then
              node -e "
                const fs = require('node:fs');
                const payload = JSON.parse(fs.readFileSync(process.argv[1], 'utf8'));
                if (payload.ok !== false || payload.error?.code !== 'unauthorized') {
                  process.exit(1);
                }
              " "$response_file"
              echo "Apex Hub API routing check passed."
              exit 0
            fi
            echo "Apex Hub API routing attempt $attempt/20 returned status=$status content-type=$content_type; retrying..."
            sleep 3
          done

          echo "Apex Hub API routing check failed after 60 seconds."
          cat "$response_file"
          exit 1

      - name: Deploy collab
        run: |
          mkdir -p "$DEPLOY_REMOTE_COLLAB_DIR/shared"
          cp -a apps/hub-collab/. "$DEPLOY_REMOTE_COLLAB_DIR/"
          cp -a apps/shared/. "$DEPLOY_REMOTE_COLLAB_DIR/shared/"
          docker compose -f "$DEPLOY_REMOTE_COLLAB_DIR/docker-compose.yml" up -d --build

      - name: Deploy tuwunel
        run: |
          if [ ! -f "$DEPLOY_REMOTE_TUWUNEL_DIR/.env" ]; then
            echo "Skipping Tuwunel deploy because $DEPLOY_REMOTE_TUWUNEL_DIR/.env is not provisioned on the server."
            exit 0
          fi

          mkdir -p "$DEPLOY_REMOTE_TUWUNEL_DIR"
          cp -a apps/tuwunel/. "$DEPLOY_REMOTE_TUWUNEL_DIR/"
          docker compose -f "$DEPLOY_REMOTE_TUWUNEL_DIR/docker-compose.yml" up -d --build

      - name: Tag deployment
        run: |
          tag="deploy-$(date +%Y%m%d-%H%M%S)"
          git tag "$tag"
          git push origin "$tag"
