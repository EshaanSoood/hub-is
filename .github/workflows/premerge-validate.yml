name: Pre-Merge Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches-ignore:
      - main

jobs:
  typecheck:
    name: Typecheck
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout facets-parser
        uses: actions/checkout@v4
        with:
          repository: EshaanSoood/facets-parser
          ref: f7d109b9762ae427e293899caa8360fb3c77865c
          path: facets-parser
          token: ${{ secrets.FACETS_PARSER_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

  validate:
    name: Validate
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout facets-parser
        uses: actions/checkout@v4
        with:
          repository: EshaanSoood/facets-parser
          ref: f7d109b9762ae427e293899caa8360fb3c77865c
          path: facets-parser
          token: ${{ secrets.FACETS_PARSER_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run validate
        run: npm run validate
