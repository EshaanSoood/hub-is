services:
  hub-collab:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eshaan-os-hub-collab
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ${HUB_COLLAB_DATA_DIR:-/home/eshaan/deployments/eshaan-os-hub-api/data}:/data:ro
    networks:
      - coolify
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:1234/readyz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.redirect-to-https-collab.redirectscheme.scheme=https
      - traefik.http.middlewares.gzip-collab.compress=true
      - traefik.http.routers.http-collab-eshaan.entrypoints=http
      - traefik.http.routers.http-collab-eshaan.rule=Host(`collab.eshaansood.org`)
      - traefik.http.routers.http-collab-eshaan.middlewares=redirect-to-https-collab
      - traefik.http.routers.http-collab-eshaan.priority=500
      - traefik.http.routers.https-collab-eshaan.entrypoints=https
      - traefik.http.routers.https-collab-eshaan.rule=Host(`collab.eshaansood.org`)
      - traefik.http.routers.https-collab-eshaan.middlewares=gzip-collab
      - traefik.http.routers.https-collab-eshaan.tls=true
      - traefik.http.routers.https-collab-eshaan.tls.certresolver=letsencrypt
      - traefik.http.routers.https-collab-eshaan.priority=500
      - traefik.http.services.collab-eshaan.loadbalancer.server.port=1234

networks:
  coolify:
    external: true
