services:
  tuwunel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eshaan-os-tuwunel
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      TUWUNEL_CONFIG: /etc/tuwunel/tuwunel.toml
      TUWUNEL_REGISTRATION_SHARED_SECRET: ${TUWUNEL_REGISTRATION_SHARED_SECRET}
      TUWUNEL_REGISTRATION_TOKEN: ${TUWUNEL_REGISTRATION_SHARED_SECRET}
    volumes:
      - tuwunel_data:/data
    networks:
      coolify:
        aliases:
          - tuwunel
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.redirect-to-https-tuwunel.redirectscheme.scheme=https
      - traefik.http.middlewares.gzip-tuwunel.compress=true
      - traefik.http.routers.http-tuwunel-eshaan.entrypoints=http
      - traefik.http.routers.http-tuwunel-eshaan.rule=Host(`chat.eshaansood.org`)
      - traefik.http.routers.http-tuwunel-eshaan.middlewares=redirect-to-https-tuwunel
      - traefik.http.routers.http-tuwunel-eshaan.priority=500
      - traefik.http.routers.https-tuwunel-eshaan.entrypoints=https
      - traefik.http.routers.https-tuwunel-eshaan.rule=Host(`chat.eshaansood.org`)
      - traefik.http.routers.https-tuwunel-eshaan.middlewares=gzip-tuwunel
      - traefik.http.routers.https-tuwunel-eshaan.tls=true
      - traefik.http.routers.https-tuwunel-eshaan.tls.certresolver=letsencrypt
      - traefik.http.routers.https-tuwunel-eshaan.priority=500
      - traefik.http.services.tuwunel-eshaan.loadbalancer.server.port=6167

networks:
  coolify:
    external: true

volumes:
  tuwunel_data:
