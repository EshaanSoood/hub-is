services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: hub-os-local-keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-hub-local-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD is required}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - 127.0.0.1:${KEYCLOAK_PORT:-8081}:8080
    volumes:
      - ./realm-import:/opt/keycloak/data/import:ro
      - ../../../.local/keycloak/data:/opt/keycloak/data
